<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupplyLink | Shop Portal</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #7c3aed;
            --success: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 2rem;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-logout {
            background: #fee2e2;
            color: #ef4444;
            padding: 8px 15px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .search-section {
            margin-bottom: 2rem;
        }

        #product-search {
            width: 100%;
            padding: 15px 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: white;
            font-size: 1rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding-bottom: 120px;
        }

        .product-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: var(--shadow);
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .product-icon {
            font-size: 2.2rem;
            background: #f1f5f9;
            padding: 12px;
            border-radius: 15px;
        }

        .product-details {
            flex-grow: 1;
        }

        .unit {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .price {
            font-weight: 800;
            color: var(--primary);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            padding: 6px;
            border-radius: 30px;
        }

        .btn-qty {
            width: 32px;
            height: 32px;
            border: none;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-summary {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            border: 1px solid white;
            z-index: 1000;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-submit:disabled {
            background: #cbd5e1;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }

        .modal-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body class="shop-portal" data-products='[{"id": 1, "name": "Fresh Milk", "unit": "1 Liter", "price": 1.5, "category": "Dairy", "icon": "🥛"}, {"id": 2, "name": "Wheat Bread", "unit": "Loaf", "price": 2.2, "category": "Bakery", "icon": "🍞"}, {"id": 3, "name": "Organic Eggs", "unit": "Dozen", "price": 3.5, "category": "Dairy", "icon": "🥚"}, {"id": 4, "name": "Ground Coffee", "unit": "500g", "price": 8.0, "category": "Beverages", "icon": "☕"}, {"id": 5, "name": "Pure Butter", "unit": "250g", "price": 2.5, "category": "Dairy", "icon": "🧈"}, {"id": 6, "name": "Greek Yogurt", "unit": "500g", "price": 4.0, "category": "Dairy", "icon": "🍦"}, {"id": 7, "name": "Orange Juice", "unit": "1 Liter", "price": 3.0, "category": "Beverages", "icon": "🍊"}, {"id": 8, "name": "Digestive Biscuits", "unit": "Pack", "price": 1.8, "category": "Bakery", "icon": "🍪"}]'>
    <div class="container">
        <!-- HEADER -->
        <header>
            <div class="brand">
                <span class="logo-icon">📦</span>
                <h1>SupplyLink</h1>
            </div>
            <div class="user-info">
                    <strong>Owner</strong>
                <a href="/logout" class="btn-logout">Logout</a>
            </div>
        </header>

        <!-- SEARCH -->
        <section class="search-section">
            <input type="text" id="product-search" placeholder="Search supplies (Milk, Bread...)">
        </section>

        <!-- PRODUCTS -->
        <main class="product-grid" id="product-grid">
            <div class="product-card" data-category="Dairy" data-name="fresh milk">
                <div class="product-icon">🥛</div>
                <div class="product-details">
                    <h3>Fresh Milk</h3>
                    <p class="unit">1 Liter</p>
                    <p class="price">$1.50</p>
                </div>
                <div class="controls">
                    <button class="btn-qty minus" onclick="updateQty(1, -1)">-</button>
                    <span class="qty" id="qty-1">0</span>
                    <button class="btn-qty plus" onclick="updateQty(1, 1)">+</button>
                </div>
            </div>
            <div class="product-card" data-category="Bakery" data-name="wheat bread">
                <div class="product-icon">🍞</div>
                <div class="product-details">
                    <h3>Wheat Bread</h3>
                    <p class="unit">Loaf</p>
                    <p class="price">$2.20</p>
                </div>
                <div class="controls">
                    <button class="btn-qty minus" onclick="updateQty(2, -1)">-</button>
                    <span class="qty" id="qty-2">0</span>
                    <button class="btn-qty plus" onclick="updateQty(2, 1)">+</button>
                </div>
            </div>
            <div class="product-card" data-category="Dairy" data-name="organic eggs">
                <div class="product-icon">🥚</div>
                <div class="product-details">
                    <h3>Organic Eggs</h3>
                    <p class="unit">Dozen</p>
                    <p class="price">$3.50</p>
                </div>
                <div class="controls">
                    <button class="btn-qty minus" onclick="updateQty(3, -1)">-</button>
                    <span class="qty" id="qty-3">0</span>
                    <button class="btn-qty plus" onclick="updateQty(3, 1)">+</button>
                </div>
            </div>
            <div class="product-card" data-category="Beverages" data-name="ground coffee">
                <div class="product-icon">☕</div>
                <div class="product-details">
                    <h3>Ground Coffee</h3>
                    <p class="unit">500g</p>
                    <p class="price">$8.00</p>
                </div>
                <div class="controls">
                    <button class="btn-qty minus" onclick="updateQty(4, -1)">-</button>
                    <span class="qty" id="qty-4">0</span>
                    <button class="btn-qty plus" onclick="updateQty(4, 1)">+</button>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="cart-summary">
            <div class="summary-info">
                <span id="items-count">0 units</span>
                <span class="total-price" id="total-price">$0.00</span>
            </div>
            <button class="btn-submit" id="submit-btn" disabled onclick="submitOrder()">
                Submit Order
            </button>
        </footer>
    </div>

    <!-- SUCCESS MODAL -->
    <div class="modal-overlay" id="success-modal" style="display:none;">
        <div class="modal">
            <div class="modal-icon">✅</div>
            <h2>Order Placed!</h2>
            <p>Your supply request has been sent to the Admin.</p>
            <button class="btn-primary" onclick="closeModal()">Done</button>
        </div>
    </div>

    <script src="./supplylink.js"></script>
</body>

</html>
